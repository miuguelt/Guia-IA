version: '3.8'
services:
  guia-ia:
    build: .
    container_name: guia_ia_sovereign
    expose:
      - 8020
    volumes:
      - experience_data:/app/data
      - knowledge_base:/app/src/knowledge
    environment:
      - PORT=8020
      - DB_PATH=/app/data/leaderboard.db
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    restart: unless-stopped

volumes:
  experience_data:
  knowledge_base:
 

